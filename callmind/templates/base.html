<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CallMind{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="/" class="logo">
                <span class="logo-icon">&#9737;</span>
                <span class="logo-text">CallMind</span>
            </a>
            <div class="nav-tagline">Video Intelligence Service</div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>Built with <a href="https://github.com/anthroos/openexp" target="_blank">OpenExp</a> &mdash; Q-learning memory for AI agents</p>
            <p class="footer-tech">Gemini Multimodal &bull; Unkey Auth &bull; Qdrant &bull; FastEmbed &bull; Q-Learning</p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
