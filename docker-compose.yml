version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  callmind:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - QDRANT_HOST=qdrant
      - CALLMIND_HOST=0.0.0.0
    depends_on:
      - qdrant
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

volumes:
  qdrant_data:
